<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Bolão dos Limas</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    
    <div id="auth-section" class="auth-panel">
      <div class="header">
        <h1>Bolão dos <span>Limas</span></h1>
        <p>Acesso Administrativo Restrito</p>
      </div>
      <div class="card" style="margin-top: 16px;">
        <input type="email" id="admin-email" class="input-nome" placeholder="E-mail do Administrador">
        <input type="password" id="admin-senha" class="input-nome" placeholder="Senha do Painel">
        <button class="btn" id="btn-login">Acessar Sistema</button>
      </div>
    </div>

    <div id="admin-section" class="admin-panel">
      <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="font-size: 1.5rem;">Painel <span>Controle</span></h1>
        <button id="btn-logout" style="background: none; border: none; color: #ff5252; font-weight: 700; cursor: pointer;">Sair</button>
      </div>

      <div class="tab-menu">
        <button class="tab-btn active" id="tab-pendentes">Pendentes</button>
        <button class="tab-btn" id="tab-validados">Validados</button>
      </div>

      <div id="lista-bilhetes">
        </div>
    </div>

  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
