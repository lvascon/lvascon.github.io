<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Bolão dos Limas</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container container-admin">
    
    <div id="auth-section" class="auth-panel">
      <div class="header">
        <h1>Bolão dos <span>Limas</span></h1>
        <p>Acesso Administrativo Restrito</p>
      </div>
      <div class="card" style="margin-top: 16px; max-width: 400px; margin-left: auto; margin-right: auto; padding: 24px;">
        <input type="email" id="admin-email" class="input-nome" placeholder="E-mail do Administrador">
        <input type="password" id="admin-senha" class="input-nome" placeholder="Senha do Painel" style="margin-top: 12px;">
        <button class="btn" id="btn-login" style="margin-top: 16px;">Acessar Sistema</button>
        <div id="login-feedback" style="color: #ef4444; margin-top: 12px; font-size: 0.9rem; font-weight: 600; display: none; text-align: center;"></div>
      </div>
    </div>

    <div id="admin-section" class="admin-panel" style="display: none;">
      <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 18px;">
        <h1 style="font-size: 1.8rem;">Painel de <span>Controle</span></h1>
        <button id="btn-logout" style="background: none; border: none; color: #ef4444; font-weight: 700; cursor: pointer; padding: 8px; font-size: 1rem;">Sair</button>
      </div>

      <div class="tab-menu" style="margin-bottom: 20px;">
        <button class="tab-btn active" id="tab-pendentes">Apostas Pendentes</button>
        <button class="tab-btn" id="tab-validados">Apostas Validadas</button>
        <button class="tab-btn" id="tab-config">Resultados & Config.</button>
      </div>

      <div id="visao-lista">
        <div class="search-container">
          <input type="text" id="input-busca" class="input-busca" placeholder="🔍 Buscar por ID ou Nome do apostador...">
        </div>
        <div id="lista-bilhetes" style="overflow-x: auto;"></div>
      </div>

      <div id="visao-config" style="display: none;">
        <div class="card" style="padding: 24px;">
          
          <h2 style="font-size: 1.4rem; margin-bottom: 16px;">Parâmetros de Pontuação</h2>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
            <div>
              <label style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted);">Pontos por Acerto de Resultado (Vencedor/Empate)</label>
              <input type="number" id="cfg-pts-resultado" class="input-nome" style="margin-top: 6px;" value="1">
            </div>
            <div>
              <label style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted);">Pontos EXTRAS por Placar Exato</label>
              <input type="number" id="cfg-pts-exato" class="input-nome" style="margin-top: 6px;" value="2">
            </div>
          </div>

          <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 24px 0;">

          <h2 style="font-size: 1.4rem; margin-bottom: 8px;">Placares Oficiais</h2>
          <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;">Preencha os jogos que já terminaram. Deixe vazio os que não ocorreram.</p>
          
          <div class="modal-jogos" style="max-width: 500px; max-height: 350px; overflow-y: auto;">
            <div id="container-jogos-reais"></div>
          </div>

          <button id="btn-salvar-calcular" class="btn" style="margin-top: 24px;">Salvar Regras e Recalcular Ranking Geral</button>
        </div>
      </div>
    </div>

  </div>

  <div id="modal-editar" class="modal-overlay">
    <div class="modal-content">
      <h2>Editar Aposta</h2>
      <input type="hidden" id="edit-id-banco">
      <div>
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600;">Nome do Apostador</label>
        <input type="text" id="edit-nome" class="input-nome" style="padding: 12px; margin-top: 4px;">
      </div>
      <div class="modal-jogos" style="max-height: 350px; overflow-y: auto;">
        <div id="container-jogos-edicao"></div>
      </div>
      <div class="modal-acoes">
        <button id="btn-cancelar-edicao" class="btn" style="background: #e2e8f0; color: #475569;">Cancelar</button>
        <button id="btn-salvar-edicao" class="btn">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
